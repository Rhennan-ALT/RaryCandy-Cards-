<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexCards</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style type="text/tailwindcss">
        @layer components {
            .poke-card {
                @apply bg-slate-800 border border-slate-700 rounded-2xl p-5 
                       transition-all duration-300 hover:scale-105 hover:border-blue-500;
            }
            .btn-delete {
                @apply bg-red-500/10 text-red-500 border border-red-500/20 
                       px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition-all;
            }
        }

        body {
            background-color: #6266AF;
        }
    
</style>
</head>

<body>
    <div id="app" class="container mx-auto p-6 flex flex-col">
        <header
            class=" bg-black/10 backdrop-blur-lg flex justify-between pt-8  z-50 items-center fixed w-full top-0 left-0 ">
            
            <h1 class="text-4xl tracking-wide font-bold text-white">RareCandy <span class="text-blue-500">Cards</span>
            </h1>

            <nav id="nav_bar" class="gap-6">
                <button id="btn_home" class="">HOME</button>
                <button id="btn_dex" class="">DEX</button>
            </nav>

            <input type="text" id="search" placeholder="Buscar pokémon..."
                    class="bg-slate-700 text-white px-4 py-2 rounded-full outline-none focus:ring-2 ring-blue-500">


        </header>

        <main id="pokemon-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </main>

    </div>

    <script src="./app.js"></script>
</body>

</html>
